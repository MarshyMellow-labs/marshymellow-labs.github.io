      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "gg sans";
      src: url("assets/fonts/gg%20sans%20Bold.ttf") format("truetype");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --ink: #372840;
      --muted: #746579;
      --berry: #ff6fae;
      --cocoa: #6d5aa8;
      --line: rgba(255, 111, 174, 0.24);
      --shadow: 0 18px 42px rgba(255, 111, 174, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background:
        linear-gradient(145deg, #cbeeff 0%, #eaf8ff 38%, #fff2b8 70%, #ffd6eb 100%);
      color: var(--ink);
      display: grid;
      font-family: "gg sans", "gg sans Normal", Inter, "Segoe UI", system-ui, sans-serif;
      line-height: 1.5;
      margin: 0;
      min-height: 100vh;
      padding: clamp(24px, 5vw, 64px);
    }

    main {
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 22px;
      justify-items: center;
      margin: 0 auto;
      max-width: 780px;
      padding: clamp(26px, 5vw, 54px);
      text-align: center;
    }

    .logo {
      display: block;
      height: auto;
      max-width: min(100%, 520px);
    }

    h1 {
      color: var(--berry);
      font-size: clamp(2.6rem, 8vw, 5.8rem);
      line-height: 0.95;
      margin: 0;
      text-shadow: 3px 3px 0 rgba(255, 242, 173, 0.95);
    }

    p {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.22rem);
      margin: 0;
      max-width: 48ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    a {
      align-items: center;
      background: rgba(255, 255, 255, 0.62);
      border: 2px solid var(--ink);
      border-radius: 999px;
      color: var(--ink);
      display: inline-flex;
      font-weight: 900;
      justify-content: center;
      min-height: 46px;
      padding: 11px 18px;
      text-decoration: none;
    }

    a.primary {
      background: var(--berry);
      border-color: var(--berry);
      box-shadow: 0 8px 18px rgba(255, 111, 174, 0.24);
    }
